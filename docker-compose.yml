services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports: ["5432:5432"]
    volumes:
      - ./.data/pg:/var/lib/postgresql/data
      - ./zitadel/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    # provisioned for future use only — no code uses it in V1

  zitadel:
    image: ghcr.io/zitadel/zitadel:v4.16.0
    command: "start-from-init --masterkeyFromEnv --tlsMode external"
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: db
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: ${POSTGRES_USER}
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${POSTGRES_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: ${POSTGRES_USER}
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${POSTGRES_PASSWORD}
      ZITADEL_MASTERKEY: ${ZITADEL_MASTERKEY}
      ZITADEL_EXTERNALDOMAIN: ${ZITADEL_EXTERNALDOMAIN}
      ZITADEL_EXTERNALSECURE: "true"
      ZITADEL_EXTERNALPORT: "443"
      ZITADEL_TLS_ENABLED: "true"
      ZITADEL_TLS_CERTPATH: /etc/zitadel/tls/origin.pem
      ZITADEL_TLS_KEYPATH: /etc/zitadel/tls/origin-key.pem
      # compose brief: db + redis + zitadel + entitlement (legacy login UI, no Login V2 container).
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: "false"
      # Allow Actions v2 target to reach entitlement on the compose network (private CIDR).
      ZITADEL_HTTPCLIENT_DENYLIST: "169.254.0.0/16,100.64.0.0/10,0.0.0.0/8"
    depends_on:
      db:
        condition: service_healthy
    expose:
    - "8080"
    networks:
      - default
      - proxy

  login:
    # Login V2 (หน้า login กลาง) — เปิดใช้ด้วย profile หลังมี PAT:
    #   docker compose --profile login up -d login
    # ต้องมี LOGIN_CLIENT_PAT ใน .env (PAT ของ SA บทบาท IAM_LOGIN_CLIENT)
    #
    # ⚠️ ไม่ใช่ image ทางการแล้ว — fork ของเราที่ปรับ UI ตาม design
    #   source:      github.com/KritapasPame/zitadel  (branch custom-login, base v4.16.0)
    #   local clone: ../zitadel-login-fork
    #   build ใหม่:  cd ../zitadel-login-fork && pnpm exec nx pack @zitadel/login \
    #                && docker tag zitadel/zitadel-login:local edm/zitadel-login:v4.16.0
    image: edm/zitadel-login:v4.16.0
    profiles: ["login"]
    environment:
      ZITADEL_API_URL: https://${ZITADEL_EXTERNALDOMAIN}
      ZITADEL_SERVICE_USER_TOKEN: ${LOGIN_CLIENT_PAT:-}
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - default
      - proxy

  entitlement:
    build:
      context: .
      dockerfile: entitlement/Dockerfile
    env_file:
      - ./entitlement/.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/entitlement
      PORT: "3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "3020:3000"
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "const r=await fetch('http://127.0.0.1:3000/health'); if(!r.ok) process.exit(1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  default:
  proxy:
    external: true